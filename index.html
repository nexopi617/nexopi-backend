<!DOCTYPE html>
<html>
<head>
    <title>NexoPi Test</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
</head>
<body>
    <h1>NexoPi شغال ✅</h1>
    <button onclick="login()">Login with Pi</button>
    <button onclick="pay()">Pay 1 Pi Test</button>
    <div id="username"></div>

    <script>
        Pi.init({ version: "2.0", sandbox: true });

        function login() {
            Pi.authenticate(['username', 'payments'], function(auth) {
                document.getElementById('username').innerText = 'Hello @' + auth.user.username;
            });
        }

        function pay() {
            Pi.createPayment({
                amount: 1,
                memo: "Test Payment",
                metadata: { test: true },
            }, {
                onReadyForServerApproval: (paymentId) => {
                    fetch('/approve-payment', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ paymentId: paymentId })
                    });
                },
                onReadyForServerCompletion: (paymentId, txid) => {
                    fetch('/complete-payment', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ paymentId: paymentId, txid: txid })
                    });
                }
            });
        }
    </script>
</body>
</html>
