<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexoPi</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        body { font-family: Arial; text-align: center; padding: 50px; background: #1a1a2e; color: white; }
        button { padding: 15px 30px; margin: 10px; font-size: 18px; border: none; border-radius: 8px; cursor: pointer; }
        #loginBtn { background: #7c3aed; color: white; }
        #payBtn { background: #fbbf24; color: black; }
        #status { margin-top: 30px; font-size: 16px; min-height: 24px; }
        #username { margin-top: 10px; font-weight: bold; color: #34d399; }
    </style>
</head>
<body>
    <h1>NexoPi شغال ✅</h1>
    <p id="version">Testnet Version</p>
    
    <button id="loginBtn">Login with Pi</button>
    <button id="payBtn">Pay 0.01 Pi</button>
    
    <div id="username"></div>
    <div id="status"></div>

    <script>
        // التعديل 1: خليها sandbox: true للتست
        // Mainnet ما يخدمش إلا كان App موافق عليه
        Pi.init({ version: "2.0", sandbox: true });

        const statusEl = document.getElementById('status');
        const usernameEl = document.getElementById('username');
        let currentUser = null;

        // التعديل 2: استعمل async/await أنظف من .then
        async function login() {
            try {
                statusEl.innerText = 'جاري تسجيل الدخول...';
                const scopes = ['username', 'payments'];
                const authResult = await Pi.authenticate(scopes, onIncompletePaymentFound);
                
                currentUser = authResult.user;
                usernameEl.innerText = 'Hello @' + currentUser.username;
                statusEl.innerText = 'تم تسجيل الدخول بنجاح ✅';
            } catch (error) {
                statusEl.innerText = 'فشل تسجيل الدخول: ' + error.message;
                console.error(error);
            }
        }

        async function pay() {
            if (!currentUser) {
                statusEl.innerText = 'لازم تعمل Login الأول';
                return;
            }

            try {
                statusEl.innerText = 'جاري إنشاء الدفع...';
                
                await Pi.createPayment({
                    amount: 0.01, // خليها 0.01 للتست اسهل
                    memo: "NexoPi Test Payment",
                    metadata: { test: true },
                }, {
                    onReadyForServerApproval: (paymentId) => {
                        statusEl.innerText = 'جاري الموافقة على الدفع...';
                        fetch('/approve-payment', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ paymentId })
                        }).then(res => {
                            if (!res.ok) statusEl.innerText = 'فشل الموافقة من السيرفر';
                        }).catch(err => {
                            statusEl.innerText = 'خطأ شبكة في الموافقة';
                        });
                    },
                    onReadyForServerCompletion: (paymentId, txid) => {
                        statusEl.innerText = 'جاري إكمال الدفع...';
                        fetch('/complete-payment', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ paymentId, txid })
                        }).then(res => {
                            if (res.ok) {
                                statusEl.innerText = 'تم الدفع بنجاح 🎉 شكراً لك';
                            } else {
                                statusEl.innerText = 'فشل إكمال الدفع من السيرفر';
                            }
                        }).catch(err => {
                            statusEl.innerText = 'خطأ شبكة في الإكمال';
                        });
                    },
                    onCancel: (paymentId) => {
                        statusEl.innerText = 'تم إلغاء الدفع بواسطتك';
                    },
                    onError: (error, payment) => {
                        statusEl.innerText = 'خطأ في الدفع: ' + error.message;
                        console.error("Payment error:", error, payment);
                    }
                });
            } catch (error) {
                statusEl.innerText = 'فشل إنشاء الدفع: ' + error.message;
            }
        }

        function onIncompletePaymentFound(payment) {
            console.log('Incomplete payment found:', payment);
            statusEl.innerText = 'لقيت دفع قديم موش كامل...';
        }

        // التعديل 3: نحي onclick من HTML و نربطو هنا. أنظف و أأمن
        document.getElementById('loginBtn').addEventListener('click', login);
        document.getElementById('payBtn').addEventListener('click', pay);
    </script>
</body>
</html>
