<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexoPi</title>
    <link rel="manifest" href="/manifest.json">
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Arial, sans-serif;
            text-align: center;
            padding: 50px 20px;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }
        #version {
            color: #94a3b8;
            margin-bottom: 30px;
        }
        button {
            padding: 15px 30px;
            margin: 10px;
            font-size: 18px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            width: 220px;
        }
        button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        #login {
            background: #7c3aed;
            color: white;
        }
        #login:hover:not(:disabled) {
            background: #6d28d9;
        }
        #pay {
            background: #fbbf24;
            color: #1a1a2e;
        }
        #pay:hover:not(:disabled) {
            background: #f59e0b;
        }
        #status {
            margin-top: 20px;
            font-size: 16px;
            min-height: 24px;
            color: #cbd5e1;
            max-width: 400px;
            font-weight: 500;
        }
        .error { color: #f87171 !important; }
        .success { color: #34d399 !important; }
    </style>
</head>
<body>
    <h1>NexoPi شغال ✅</h1>
    <p id="version">Testnet Version</p>
    
    <button id="login">Login with Pi</button>
    <button id="pay" disabled>Pay 0.01 Pi</button>
    
    <div id="status"></div>

    <script>
        // 1. Init Pi SDK - مهم برشا
        Pi.init({ version: "2.0", sandbox: true });

        // 2. متغيرات عامة
        const statusEl = document.getElementById("status");
        const loginBtn = document.getElementById("login");
        const payBtn = document.getElementById("pay");
        let currentUser = null;

        function setStatus(message, type = '') {
            statusEl.innerText = message;
            statusEl.className = type;
        }

        // 3. Login with Pi
        loginBtn.addEventListener("click", async () => {
            try {
                loginBtn.disabled = true;
                setStatus("Logging in...");
                const scopes = ['username', 'payments'];
                const auth = await Pi.authenticate(scopes, onIncompletePaymentFound);
                currentUser = auth.user;
                setStatus("Logged in: @" + auth.user.username, 'success');
                payBtn.disabled = false;
                console.log("Auth success:", auth);
            } catch (err) {
                setStatus("Login failed: " + err.message, 'error');
                console.error("Auth error:", err);
                loginBtn.disabled = false;
            }
        });

        // 4. Pay Test
        payBtn.addEventListener("click", async () => {
            if (!currentUser) {
                setStatus("Please login first!", 'error');
                return;
            }

            try {
                setStatus("Creating payment...");
                payBtn.disabled = true;
                
                await Pi.createPayment({
                    amount: 0.01,
                    memo: "NexoPi Test Payment",
                    metadata: { app: "NexoPi", orderId: Date.now() }
                }, {
                    // الخطوة 1: جاهز للموافقة من السيرفر
                    onReadyForServerApproval: async function(paymentId) {
                        setStatus("Approving payment...");
                        console.log("onReadyForServerApproval", paymentId);
                        
                        try {
                            const res = await fetch('/approve-payment', {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify({ paymentId })
                            });
                            
                            if (!res.ok) throw new Error('Server approval failed');
                            
                            setStatus("Approved! Check your Pi Wallet...");
                        } catch (err) {
                            setStatus("Approval failed: " + err.message, 'error');
                            console.error("Approval error:", err);
                            payBtn.disabled = false;
                        }
                    },
                    
                    // الخطوة 2: جاهز للتكملة من السيرفر
                    onReadyForServerCompletion: async function(paymentId, txid) {
                        setStatus("Completing payment...");
                        console.log("onReadyForServerCompletion", paymentId, txid);
                        
                        try {
                            const res = await fetch('/complete-payment', {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify({ paymentId, txid })
                            });
                            
                            if (!res.ok) throw new Error('Server completion failed');
                            
                            setStatus("Payment successful! ✅", 'success');
                        } catch (err) {
                            setStatus("Completion failed: " + err.message, 'error');
                            console.error("Completion error:", err);
                        } finally {
                            payBtn.disabled = false;
                        }
                    },
                    
                    // الخطوة 3: المستخدم عمل Cancel
                    onCancel: function(paymentId) {
                        setStatus("Payment cancelled", 'error');
                        console.log("onCancel", paymentId);
                        payBtn.disabled = false;
                    },
                    
                    // الخطوة 4: صار Error
                    onError: function(error, payment) {
                        setStatus("Payment error: " + error.message, 'error');
                        console.error("onError", error, payment);
                        payBtn.disabled = false;
                    }
                });
                
            } catch (err) {
                setStatus("Payment failed: " + err.message, 'error');
                console.error("Payment error:", err);
                payBtn.disabled = false;
            }
        });

        // 5. دالة تخدم كان فما payment ناقص
        function onIncompletePaymentFound(payment) {
            console.log("Incomplete payment found:", payment);
            setStatus("Found incomplete payment. Complete it from Pi Wallet", 'error');
        }

        // Check لو احنا في Pi Browser
        window.addEventListener('load', () => {
            if (typeof Pi === 'undefined') {
                setStatus('لازم تفتح التطبيق من Pi Browser', 'error');
                loginBtn.disabled = true;
            }
        });
    </script>
</body>
</html>
